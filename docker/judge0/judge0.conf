# Judge0 runtime configuration
# Full reference: https://github.com/judge0/judge0/blob/master/judge0.conf

REDIS_PASSWORD=changeme_judge0_redis
POSTGRES_PASSWORD=changeme_judge0_db

# CPU time limit per submission (seconds)
CPU_TIME_LIMIT=5

# Wall-clock time limit (seconds)
WALL_TIME_LIMIT=10

# Memory limit (KB)
MEMORY_LIMIT=131072

# Max output size (KB)
MAX_FILE_SIZE=1024

# Allow only the languages InterviewMind uses
# 60=Go, 62=Java, 63=Node.js, 71=Python3, 74=TypeScript, 54=C++ GCC
ALLOWED_LANGUAGES_FOR_COMPILE_AND_RUN=54,60,62,63,71,74
